<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur de négociation demand-response — démo</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
    color: #2c2c2a;
    background: #fff;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.subtitle { color: #5f5e5a; font-size: 14px; margin-top: 0; margin-bottom: 24px; }
  .dots { display: flex; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #d3d1c7; }
  .dot.active { background: #185fa5; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .step-count { font-size: 13px; color: #5f5e5a; }
  .card {
    background: #f7f6f2;
    border: 1px solid #e4e2d8;
    border-radius: 12px;
    padding: 20px;
    min-height: 220px;
  }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
  }
  .badge-dso { background: #185fa5; }
  .badge-supplier { background: #0f6e56; }
  .badge-aggregator { background: #854f0b; }
  .badge-regulator { background: #3b6d11; }
  .role { font-size: 13px; color: #5f5e5a; margin-left: 8px; }
  .final-badge {
    margin-left: auto;
    background: #eaf3de;
    color: #27500a;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 6px;
  }
  .row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .action { font-size: 15px; font-weight: 600; margin: 0 0 8px; }
  .reasoning { font-size: 14px; color: #5f5e5a; line-height: 1.6; margin: 0 0 14px; }
  table { width: 100%; border-top: 1px solid #e4e2d8; padding-top: 8px; border-collapse: collapse; }
  td { padding: 3px 0; font-size: 13px; }
  td:last-child { text-align: right; font-weight: 500; }
  .nav { display: flex; justify-content: space-between; margin-top: 16px; }
  button {
    background: #fff;
    border: 1px solid #b4b2a9;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: #f1efe8; }
  button:disabled { visibility: hidden; }
  footer { margin-top: 24px; font-size: 13px; color: #888780; }
  footer a { color: #185fa5; }
</style>
</head>
<body>

<h1>Simulateur de négociation demand-response multi-agents</h1>
<p class="subtitle">Rejeu d'une négociation générée via l'API Mistral — voir le code source sur GitHub</p>

<div class="top-bar">
  <div class="dots" id="dots"></div>
  <span class="step-count" id="step-count">Étape 1 / 5</span>
</div>

<div class="card" id="card"></div>

<div class="nav">
  <button onclick="prevStep()" id="prev-btn">← Précédent</button>
  <button onclick="nextStep()" id="next-btn">Suivant →</button>
</div>

<footer>
  Prototype construit avec le SDK Mistral. Code source et README complets dans le
  <a href="../">dépôt GitHub</a>.
</footer>

<script>
const steps = [
  {agent:"DSO", badge:"badge-dso", role:"Opérateur réseau", action:"Émet une demande d'effacement",
   reasoning:"Pic hivernal en soirée prévu, dépassant la capacité du poste source de 14MW. Demande 18MW pour garder une marge de sécurité de 4MW.",
   output:{"MW demandés":18,"Fenêtre":"17h-19h","Urgence":"Haute"}},
  {agent:"Supplier", badge:"badge-supplier", role:"Fournisseur d'énergie", action:"Propose des conditions",
   reasoning:"Offre 15MW à 180€/MWh, en dessous de la demande complète du DSO, comme position d'ouverture pour tester la flexibilité de l'agrégateur.",
   output:{"MW offerts":15,"Compensation":"180€/MWh"}},
  {agent:"Aggregator", badge:"badge-aggregator", role:"Agrégateur industriel", action:"Évalue et contre-propose",
   reasoning:"15MW livrables sans arrêt des lignes de production, mais 180€/MWh sous-évalue le coût de la perturbation. Contre-propose à 230€/MWh.",
   output:{"MW":15,"Contre-offre":"230€/MWh","Accepté":"Non"}},
  {agent:"Supplier", badge:"badge-supplier", role:"Fournisseur d'énergie", action:"Accepte la contre-offre",
   reasoning:"Accepte la contre-offre pour conclure la négociation dans la fenêtre opérationnelle, avant l'échéance d'urgence du DSO.",
   output:{"MW":15,"Compensation finale":"230€/MWh"}},
  {agent:"Regulator", badge:"badge-regulator", role:"Auditeur de conformité", action:"Valide la conformité",
   reasoning:"15MW représente 15% du pool flexible déclaré de 100MW (sous le seuil de 20%). 230€/MWh est dans le corridor régulé de 100-250€/MWh. Fenêtre de 2h sous le seuil de renouvellement de 4h.",
   output:{"Statut":"VALIDÉ"}, final:true}
];

let current = 0;

function render() {
  const s = steps[current];
  document.getElementById('dots').innerHTML = steps.map((_, i) =>
    `<span class="dot${i===current ? ' active' : ''}"></span>`
  ).join('');
  document.getElementById('step-count').textContent = `Étape ${current+1} / ${steps.length}`;

  const outputRows = Object.entries(s.output).map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('');

  document.getElementById('card').innerHTML = `
    <div class="row-top">
      <span class="badge ${s.badge}">${s.agent}</span>
      <span class="role">${s.role}</span>
      ${s.final ? '<span class="final-badge">Journal d\\'audit clos</span>' : ''}
    </div>
    <p class="action">${s.action}</p>
    <p class="reasoning">${s.reasoning}</p>
    <table>${outputRows}</table>
  `;

  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').textContent = current === steps.length - 1 ? 'Recommencer ↺' : 'Suivant →';
}

function nextStep() {
  if (current < steps.length - 1) { current++; } else { current = 0; }
  render();
}

function prevStep() {
  if (current > 0) { current--; render(); }
}

render();
</script>

</body>
</html>
